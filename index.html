<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Flashing Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-grid">
        <div class="output">
            <div class="scanlines"></div> <div data-previous-operand class="previous-operand"></div>
            <div data-current-operand class="current-operand"></div>
        </div>
        
        <button data-all-clear class="highlight span-two">AC</button>
        <button data-delete class="highlight">DEL</button>
        <button data-advanced="%">%</button>
        
        <button data-advanced="sin" class="adv-btn">sin</button>
        <button data-advanced="cos" class="adv-btn">cos</button>
        <button data-advanced="tan" class="adv-btn">tan</button>
        <button data-advanced="√" class="adv-btn">√</button>
        
        <button data-number>7</button>
        <button data-number>8</button>
        <button data-number>9</button>
        <button data-operation class="operator">÷</button>
        
        <button data-number>4</button>
        <button data-number>5</button>
        <button data-number>6</button>
        <button data-operation class="operator">×</button>
        
        <button data-number>1</button>
        <button data-number>2</button>
        <button data-number>3</button>
        <button data-operation class="operator">−</button>
        
        <button data-operation class="adv-btn">^</button>
        <button data-number>0</button>
        <button data-number>.</button>
        <button data-operation class="operator">+</button>
        
        <button data-equals class="span-four equals">=</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
